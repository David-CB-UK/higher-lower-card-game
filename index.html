<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Ensures the page scales correctly on mobile and tablet devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Higher or Lower</title>

    <!-- Bootstrap 5 CSS -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css"></head>

<body>

    <main class="container py-4">

    <h1 class="text-center mb-4">Higher or Lower</h1>
    
    <div class="row text-center mb-4">

        <div class="col">
            <h2 class="h6">Cards Remaining:</h2>
            <p id="cards-remaining">52</p>
        </div>

        <div class="col">
            <h2 class="h6">Current Score:</h2>
            <p id="current-score">0</p>
        </div>

        <div class="col">
            <h2 class="h6">Best Score:</h2>
            <p id="best-score">0</p>
        </div>

</div>

    <!-- Button used to draw a card from the deck -->
    <button id="draw-card">Draw Card</button>

    <!-- Temporary button used to test reshuffling the existing deck -->
    <button id="reshuffle-deck">Reshuffle Deck</button>

    <!-- Displays a messages if an API request or network connection fails -->
    <p id="error-message"></p>

    <!-- The card returned by the API will be displayed here 
    <div id="card-container"></div>-->

    <!-- Current card displayed to the player -->
    <div id="current-card-container">
        <img id="current-card-image" src="assets/images/hi-low-card-reverse.webp" alt="Reverse of Card"  class="playing-card">
    </div>

    <!-- Next card to be revealed after the player's guess -->
    <div id="next-card-container">
        <img id="next-card-image" src="assets/images/hi-low-card-reverse.webp" alt="Reverse of Card" class="playing-card">
    </div>

    <!-- Higher and Lower controls used to make the player's prediction -->
    <div class="guess-buttons">
        <button id="higher-button" disabled>Higher</button>
        <button id="lower-button" disabled>Lower</button>
    </div>


    <!-- Bootstrap JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- Link to the JavaScript file -->
    <script src="assets/js/script.js"></script>
    
</body>
</html>
