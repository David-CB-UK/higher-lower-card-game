<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Ensures the page scales correctly on mobile and tablet devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Higher or Lower</title>

    <!-- Bootstrap 5 CSS -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css"></head>

<body>

    <!-- Main navigation -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">

            <a class="navbar-brand" href="index.html">
                Higher or Lower IMAGE
            </a>

            <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle navigation">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#how-to-play">How to Play</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="https://github.com/David-CB-UK/higher-lower-card-game" target="_blank" rel="noopener noreferrer">GitHub</a>
                    </li>
                </ul>

            </div>

        </div>
    </nav>


    <main class="container py-4">

        <h1 class="text-center mb-4">Higher or Lower</h1>
        
        <div class="row text-center mb-4">

            <div class="col">
                <h2 class="h6">Cards Remaining:</h2>
                <p id="cards-remaining">52</p>
            </div>

            <div class="col">
                <h2 class="h6">Current Score:</h2>
                <p id="current-score">0</p>
            </div>

            <div class="col">
                <h2 class="h6">Best Score:</h2>
                <p id="best-score">0</p>
            </div>
        </div>


        <!-- Draw and Reshuffle controls -->
        <div class="row justify-content-center mb-4">

            <div class="col-auto">
                <button id="draw-card" class="btn btn-secondary">
                    Draw Card
                </button>
            </div>

            <div class="col-auto">
                <button id="reshuffle-deck" class="btn btn-secondary">
                    Reshuffle Deck
                </button>
            </div>

        </div>

        <!-- Game status area used to display instructions, game updates and error messages -->
        <div class="row justify-content-center mb-4">

            <div class="col-12 col-md-8">

                <div id="game-message" class="text-center">
                    Draw a card to begin!
                </div>

            </div>

        </div>


        <!-- Card display area -->
        <div class="row justify-content-center text-center mb-4">

            <div class="col-6 col-md-4">

                <!-- Current card displayed to the player -->
                <h2 class="h6">Current Card</h2>
                
                <div id="current-card-container">
                    <img id="current-card-image" src="assets/images/hi-low-card-reverse.webp" alt="Current playing card" class="playing-card">
                </div>
            </div>

            <div class="col-6 col-md-4">

                <!-- Next card to be revealed after the player's guess -->
                <h2 class="h6">Next Card</h2>

                <div id="next-card-container">
                    <img id="next-card-image" src="assets/images/hi-low-card-reverse.webp" alt="Next playing card" class="playing-card">
                </div>
            </div>

        </div>


        <!-- Higher and Lower controls used to make the player's prediction -->
        <div class="row justify-content-center mb-2">
            <div class="col-8 col-sm-6 col-md-3 d-grid">
                <button class="btn btn-primary py-2" id="higher-button" disabled>Higher</button>
            </div>
        </div>

        <div class="row justify-content-center mb-3">
            <div class="col-8 col-sm-6 col-md-3 d-grid">
                <button class="btn btn-primary py-2" id="lower-button" disabled>Lower</button>
            </div>
        </div>

            
    </main>

    <!-- Bootstrap JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- Link to the JavaScript file -->
    <script src="assets/js/script.js"></script>
    
</body>
</html>
